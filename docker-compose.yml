services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: zilpzalp-backend
    ports:
      - "8000:8000"
    environment:
      ZILPZALP_CONFIG: /config/config.yaml
    volumes:
      - ./demo/config:/config
      - ./demo/data/inbox:/data/inbox
      - ./demo/data/error:/data/error
      - ./demo/data/processed:/data/processed
      - ./demo/targets:/targets
    restart: unless-stopped

  docs:
    build:
      target: dev
      context: .
      dockerfile: Dockerfile.mkdocs
    image: zilpzalp-docs
    volumes:
      - ./mkdocs:/docs
    ports:
      - "8001:8000"
    restart: unless-stopped
    command: serve --dev-addr=0.0.0.0:8000 --livereload
