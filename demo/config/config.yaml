# Demo-Konfiguration für ZilpZalp. Wird vom docker-compose.yml als
# /config/config.yaml gemountet (./demo/config -> /config). Alle Pfade hier sind
# Container-Pfade; das Mapping auf ./demo/... legt docker-compose.yml fest.
paths:
  watchfolder: /data/inbox
  error_folder: /data/error
  processed_folder: /data/processed

original_handling: move        # move | delete | keep
summary_mode: on_conflict      # always | on_conflict | never

default_pattern: "{date}__{sender}_{doctype}_{description}"
date_format: "%Y-%m-%d"

# Optional: zusätzliche Datums-Matcher (additiv zur eingebauten Erkennung).
date_patterns:
  - label: leistungsdatum
    regex: 'Leistungsdatum:\s*(\d{2}\.\d{2}\.\d{4})'

targets:
  - name: Finanzen
    path: /targets/finanzen
    default: true
  - name: Versicherungen
    path: /targets/versicherungen
    default: false

patterns:
  - name: standard
    template: "{date}__{sender}_{doctype}_{description}"

rules:
  - name: Stromrechnung Stadtwerke
    match:
      sender_contains: "Stadtwerke"
      keywords_any: ["Stromabschlag", "Abschlag"]
    apply:
      sender: "Stadtwerke"
      doctype: "Rechnung"
      description: "Stromabschlag"
      pattern: standard
      preferred_date: rechnungsdatum
      targets: ["Finanzen"]
